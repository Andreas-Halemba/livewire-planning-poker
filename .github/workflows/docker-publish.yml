name: Build & Push Docker Images

on:
    push:
        branches: [main]
        tags: ["v*"]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_APP: ghcr.io/andreas-halemba/livewire-planning-poker
    IMAGE_WEB: ghcr.io/andreas-halemba/livewire-planning-poker-web

jobs:
    build-and-push:
        name: Build & Push to GHCR
        runs-on: ubuntu-latest
        environment: production

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate Docker metadata (app)
              id: meta-app
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_APP }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}

            - name: Generate Docker metadata (web)
              id: meta-web
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_WEB }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}

            - name: Build & push app image (PHP-FPM)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: app
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta-app.outputs.tags }}
                  labels: ${{ steps.meta-app.outputs.labels }}
                  build-args: |
                      VITE_REVERB_APP_KEY=${{ secrets.VITE_REVERB_APP_KEY }}
                      VITE_REVERB_HOST=${{ secrets.VITE_REVERB_HOST }}
                      VITE_REVERB_PORT=${{ secrets.VITE_REVERB_PORT }}
                      VITE_REVERB_SCHEME=${{ secrets.VITE_REVERB_SCHEME }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build & push web image (Nginx)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: nginx
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta-web.outputs.tags }}
                  labels: ${{ steps.meta-web.outputs.labels }}
                  build-args: |
                      VITE_REVERB_APP_KEY=${{ secrets.VITE_REVERB_APP_KEY }}
                      VITE_REVERB_HOST=${{ secrets.VITE_REVERB_HOST }}
                      VITE_REVERB_PORT=${{ secrets.VITE_REVERB_PORT }}
                      VITE_REVERB_SCHEME=${{ secrets.VITE_REVERB_SCHEME }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
